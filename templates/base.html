<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalTech Cafes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .navbar {
            background: linear-gradient(100deg, #7EC8E3 0%, #7B5EA7 50%, #E0007A 100%);
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff !important;
        }
        .navbar-brand .brand-line1,
        .navbar-brand .brand-line2 { display: block; line-height: 1; }
        .nav-link { color: rgba(255,255,255,0.9) !important; font-weight: 500; }
        .nav-link:hover { color: #fff !important; text-decoration: underline; }

        footer { font-size: 0.85rem; color: #888; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span class="brand-line1">TAL</span>
            <span class="brand-line2">TECH</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-list-ul me-1"></i>All cafes</a></li>
                <li class="nav-item"><a class="nav-link" href="/search"><i class="bi bi-clock me-1"></i>Search by hours</a></li>
                <li class="nav-item"><a class="nav-link" href="/add"><i class="bi bi-plus-circle me-1"></i>Add cafe</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<footer class="text-center py-3 mt-4 border-top">
    TalTech Cafes &middot; Flask
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
